<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPQuest - Reference Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #f4f6f9;
    }

    /* NAVBAR */
    .navbar {
      background-color: #2c4a7a;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 50px 20px 20px;
    }

    .header h1 {
      font-size: 40px;
      color: #2c4a7a;
    }

    .header p {
      color: #555;
      margin-top: 10px;
    }

    /* FILTERS */
    .filters {
      text-align: center;
      margin: 25px;
    }

    .filters input,
    .filters select {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 200px;
    }

    .filters button {
      padding: 10px 15px;
      background: #2c4a7a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* CONTAINER */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }

    /* CARD */
    .card {
      background: white;
      width: 360px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .card h3 {
      color: #2c4a7a;
    }

    .tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin: 5px 5px 5px 0;
      background: #e0e7ff;
      color: #2c4a7a;
    }

    .card p {
      margin: 10px 0;
      color: #444;
    }

    .card button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      background: #2c4a7a;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .card button:hover {
      background: #1f355a;
    }

    .footer {
      text-align: center;
      padding: 15px;
      background: #2c4a7a;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>IPQuest</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Reference Hub</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>IPR Reference Hub</h1>
  <p>Learn Intellectual Property in a simple and structured way</p>
</div>

<!-- FILTERS -->
<div class="filters">
  <input type="text" id="search" placeholder="Search...">

  <select id="category">
    <option value="">All Categories</option>
    <option value="Patent">Patent</option>
    <option value="Design">Design</option>
    <option value="Copyright">Copyright</option>
  </select>

  <select id="level">
    <option value="">All Levels</option>
    <option value="Beginner">Beginner</option>
    <option value="Intermediate">Intermediate</option>
    <option value="Advanced">Advanced</option>
  </select>

  <button onclick="fetchReferences()">Search</button>
</div>

<!-- RESULTS -->
<div class="container" id="results"></div>

<!-- FOOTER -->
<div class="footer">
  © 2026 IPQuest – Learn • Decide • Protect
</div>

<script>
const API_URL = "https://reference-be.onrender.com/api/references";

/* FETCH REFERENCES */
async function fetchReferences() {
  const search = document.getElementById("search").value;
  const category = document.getElementById("category").value;
  const level = document.getElementById("level").value;

  let url = API_URL + "?";

  if (category) url += "category=" + category + "&";
  if (level) url += "level=" + level + "&";
  if (search) url += "search=" + search;

  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p>No resources found</p>";
    return;
  }

  data.forEach(ref => {
    container.innerHTML += `
      <div class="card">
        <h3>${ref.title}</h3>

        <div>
          <span class="tag">${ref.category}</span>
          <span class="tag">${ref.level || "General"}</span>
        </div>

        <p>${ref.content || ref.description}</p>

        <button onclick="window.open('${ref.officialUrl}','_blank')">
          View Resource
        </button>

        <button onclick="showSimilar('${ref._id}')">
          Show Similar Cases
        </button>
      </div>
    `;
  });
}

/* SIMILAR CASES */
async function showSimilar(id) {
  const res = await fetch(API_URL + "/similar/" + id);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "<h2 style='text-align:center'>Similar Cases</h2>";

  if (data.length === 0) {
    container.innerHTML += "<p style='text-align:center'>No similar cases found</p>";
    return;
  }

  data.forEach(ref => {
    container.innerHTML += `
      <div class="card">
        <h3>${ref.title}</h3>
        <p>${ref.content}</p>
      </div>
    `;
  });
}

/* INITIAL LOAD */
fetchReferences();
</script>

</body>
</html>
