<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPQuest Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

form input, form select, form textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
}

th {
    background: #1e3c72;
    color: white;
}

.edit-btn { background: orange; color: white; padding: 5px; }
.delete-btn { background: red; color: white; padding: 5px; }
.save-btn { background: green; color: white; padding: 5px; }

.message {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h1>IPQuest Admin Dashboard</h1>
</header>

<div class="container">

<h2>Add Reference</h2>

<form id="adminForm">

<input type="text" id="title" placeholder="Title" required>

<textarea id="description" placeholder="Description"></textarea>

<input type="url" id="link" placeholder="Official URL" required>

<select id="category">
    <option value="Patent">Patent</option>
    <option value="Trademark">Trademark</option>
    <option value="Copyright">Copyright</option>
    <option value="GI">GI</option>
    <option value="Design">Design</option>
    <option value="General">General</option>
</select>

<select id="level">
    <option value="Beginner">Beginner</option>
    <option value="Intermediate">Intermediate</option>
    <option value="Advanced">Advanced</option>
</select>

<button type="submit">Add Reference</button>

<div class="message" id="message"></div>

</form>

<h2>All References</h2>

<table>
<thead>
<tr>
<th>Title</th>
<th>Description</th>
<th>URL</th>
<th>Category</th>
<th>Level</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="referencesTable"></tbody>
</table>

</div>

<script>

const API_URL = "https://reference-be.onrender.com/api/references";

const form = document.getElementById("adminForm");
const table = document.getElementById("referencesTable");
const message = document.getElementById("message");

// Admin check
const password = prompt("Enter Admin Password");
if(password !== "mayur123"){
    alert("Wrong password");
    window.location.href = "index.html";
}

// Load references
async function loadReferences(){
    const res = await fetch(API_URL);
    const data = await res.json();

    table.innerHTML = data.map(ref => `
        <tr data-id="${ref._id}">
            <td class="title">${ref.title}</td>
            <td class="description">${ref.description || ""}</td>
            <td><a href="${ref.officialUrl}" target="_blank">Visit</a></td>
            <td class="category">${ref.category}</td>
            <td class="level">${ref.level}</td>
            <td>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </td>
        </tr>
    `).join("");

    attachEvents();
}

// Attach buttons
function attachEvents(){
    document.querySelectorAll(".delete-btn").forEach(btn=>{
        btn.onclick = deleteRef;
    });

    document.querySelectorAll(".edit-btn").forEach(btn=>{
        btn.onclick = editRef;
    });
}

// Add reference (FIXED FIELD NAME)
form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const ref = {
        title: title.value,
        description: description.value,
        officialUrl: link.value,   // ✅ FIXED HERE
        category: category.value,
        level: level.value
    };

    const res = await fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(ref)
    });

    const data = await res.json();

    if(res.ok){
        message.style.color="green";
        message.textContent="Reference added successfully!";
        form.reset();
        loadReferences();
    } else {
        message.style.color="red";
        message.textContent=data.message || "Error adding reference";
    }
});

// Delete
async function deleteRef(e){
    const id = e.target.closest("tr").dataset.id;

    await fetch(`${API_URL}/${id}`,{
        method:"DELETE"
    });

    loadReferences();
}

// Edit
function editRef(e){
    const row = e.target.closest("tr");
    const id = row.dataset.id;

    const t = row.querySelector(".title").textContent;
    const d = row.querySelector(".description").textContent;
    const c = row.querySelector(".category").textContent;
    const l = row.querySelector(".level").textContent;

    row.querySelector(".title").innerHTML = `<input value="${t}">`;
    row.querySelector(".description").innerHTML = `<textarea>${d}</textarea>`;

    row.querySelector(".category").innerHTML = `
        <select>
            <option ${c=="Patent"?"selected":""}>Patent</option>
            <option ${c=="Trademark"?"selected":""}>Trademark</option>
            <option ${c=="Copyright"?"selected":""}>Copyright</option>
            <option ${c=="GI"?"selected":""}>GI</option>
            <option ${c=="Design"?"selected":""}>Design</option>
            <option ${c=="General"?"selected":""}>General</option>
        </select>
    `;

    row.querySelector(".level").innerHTML = `
        <select>
            <option ${l=="Beginner"?"selected":""}>Beginner</option>
            <option ${l=="Intermediate"?"selected":""}>Intermediate</option>
            <option ${l=="Advanced"?"selected":""}>Advanced</option>
        </select>
    `;

    e.target.textContent = "Save";
    e.target.classList.add("save-btn");

    e.target.onclick = async function(){

        const updated = {
            title: row.querySelector("input").value,
            description: row.querySelector("textarea").value,
            category: row.querySelector(".category select").value,
            level: row.querySelector(".level select").value,
            officialUrl: row.querySelector("a").href
        };

        await fetch(`${API_URL}/${id}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(updated)
        });

        loadReferences();
    }
}

loadReferences();

</script>

</body>
</html>
